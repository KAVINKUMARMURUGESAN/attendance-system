<!DOCTYPE html>
<html>
<head>
    <title>Live Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 text-center">

<h1 class="text-2xl font-bold mb-4">Live Attendance Detection</h1>

<img src="http://localhost:5000/video-feed" class="mx-auto border rounded shadow" width="600">

<div class="mt-4 space-x-4">
    <button onclick="startCamera()" class="bg-green-600 text-white px-4 py-2 rounded">Start</button>
    <button onclick="stopCamera()" class="bg-red-600 text-white px-4 py-2 rounded">Stop</button>
</div>

<script>
function startCamera() {
    fetch("http://localhost:5000/start-camera");
}

function stopCamera() {
    fetch("http://localhost:5000/stop-camera");
}
</script>


</body>
</html>
