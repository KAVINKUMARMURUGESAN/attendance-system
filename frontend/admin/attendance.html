<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">
    <!-- Sidebar -->
    <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
        <h2 class="text-xl font-bold mb-6">Admin Panel</h2>
        <ul class="space-y-3">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="students.html">Manage Students</a></li>
            <li><a href="attendance.html" class="font-bold underline">Attendance</a></li>
        </ul>
    </div>

    <!-- Content -->
    <div class="flex-1 p-8">
        <h1 class="text-3xl font-bold mb-6">Attendance Records</h1>

        <table class="w-full bg-white shadow rounded text-sm">
            <thead class="bg-gray-200">
                <tr>
                    <th class="p-2 border">Student ID</th>
                    <th class="p-2 border">Date</th>
                    <th class="p-2 border">Entry</th>
                    <th class="p-2 border">Exit</th>
                    <th class="p-2 border">Minutes</th>
                    <th class="p-2 border">Status</th>
                </tr>
            </thead>
            <tbody id="attendanceTable"></tbody>
        </table>
    </div>
</div>
<th class="p-2 border">Action</th>

<script src="../js/attendance.js"></script>
</body>
</html>
