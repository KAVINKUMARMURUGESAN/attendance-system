<!DOCTYPE html>
<html>
<head>
    <title>Staff Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<script>
if (!localStorage.getItem("staff")) {
    window.location.href = "login.html";
}
</script>

<h1 class="text-3xl font-bold mb-6">Attendance Management</h1>

<table class="w-full bg-white shadow rounded text-sm">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-2 border">Student ID</th>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Entry</th>
            <th class="p-2 border">Exit</th>
            <th class="p-2 border">Duration</th>
            <th class="p-2 border">Status</th>
            <th class="p-2 border">Actions</th>
        </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
</table>

<script src="../js/staff-attendance.js"></script>
</body>
</html>
