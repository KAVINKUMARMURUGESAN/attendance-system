<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<script>
if (!localStorage.getItem("student")) {
    window.location.href = "../index.html";
}
</script>

<h1 class="text-3xl font-bold mb-4">Student Dashboard</h1>

<p id="welcome" class="mb-6 text-lg"></p>

<table class="w-full bg-white shadow rounded text-sm">
    <thead class="bg-gray-200">
        <tr>
            <th class="p-2 border">Date</th>
            <th class="p-2 border">Entry</th>
            <th class="p-2 border">Exit</th>
            <th class="p-2 border">Duration</th>
            <th class="p-2 border">Status</th>
        </tr>
    </thead>
    <tbody id="attendanceTable"></tbody>
</table>

<script src="../js/student-attendance.js"></script>
</body>
</html>
